<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý sách - Thư viện thông minh</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light.css" />
    <link rel="stylesheet" href="../css/dark.css" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <div class="page-shell">
      <div id="admin-header"></div>

      <main class="admin-layout">
        <div id="admin-sidebar"></div>

        <section class="glass-card admin-content">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 24px;
            "
          >
            <div>
              <h1>Quản lý sách</h1>
              <p>Quản lý toàn bộ dữ liệu sách trong hệ thống.</p>
            </div>
            <button class="btn btn--primary">Thêm sách mới</button>
          </div>

          <!-- Khung chứa 150 quyển sách -->
          <div
            id="adminBookList"
            style="display: flex; flex-direction: column; gap: 12px"
          >
            <!-- Sách sẽ được render tự động vào đây -->
          </div>
        </section>
      </main>

      <div id="admin-footer"></div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <!-- Đã sửa lại đường dẫn có ../ -->
    <script src="../js/storage.js"></script>
    <script src="../js/loader.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/components.js"></script>

    <!-- Script tự động hiển thị dữ liệu sách -->
    <script>
      requireAdmin();

      document.addEventListener("DOMContentLoaded", () => {
        const bookList = document.getElementById("adminBookList");

        // Tách riêng hàm render để có thể gọi lại
        const renderBooks = () => {
          const books = Storage.getBooks() || [];

          if (books.length === 0) {
            bookList.innerHTML =
              '<p class="empty-state">Chưa có dữ liệu sách. Hãy thêm dữ liệu JSON vào hệ thống.</p>';
            return;
          }

          bookList.innerHTML = books
            .map(
              (book) => `
                <div class="list-item" style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <strong style="font-size: 1.1rem; display: block; margin-bottom: 4px;">${book.title}</strong>
                    <p style="margin: 0; font-size: 0.9rem; opacity: 0.8;">
                      Tác giả: ${book.author} • Thể loại: ${book.category} • ISBN: ${book.isbn}
                    </p>
                  </div>
                  <div style="text-align: right; display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
                    <span class="status-pill active">Sẵn có: ${book.available} cuốn</span>
                    <button class="btn btn--ghost" style="padding: 4px 12px; font-size: 0.85rem;">Sửa / Xóa</button>
                  </div>
                </div>
             `,
            )
            .join("");
        };

        // Lần 1: Cố gắng vẽ ngay lập tức (nếu data đã có sẵn trong Local Storage)
        renderBooks();

        // Lần 2: Chờ 0.5 giây cho file loader.js chạy xong rồi vẽ lại chắc cú
        setTimeout(renderBooks, 500);
      });
    </script>
  </body>
</html>
